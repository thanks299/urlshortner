<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Welcome to URL Shortener</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; }
      .container { max-width: 600px; margin: 0 auto; padding: 20px; }
      .header { background: linear-gradient(135deg, #4a5cc4 0%, #5a3a7a 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; }
      .content { margin: 20px 0; }
      .button { display: inline-block; padding: 12px 24px; background: #5050d0; color: white; text-decoration: none; border-radius: 4px; margin: 10px 0; }
      .footer { color: #999; font-size: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Welcome to URL Shortener 🔗</h1>
      </div>

      <div class="content">
        <p>Hi {{userEmail}},</p>
        <p>Welcome! Your account has been created successfully.</p>
        <p>You can now start shortening URLs and tracking their performance.</p>

        <a href="{{appUrl}}/app" class="button">Go to Dashboard</a>

        <div class="footer">
          <p>If you have any questions, feel free to reach out.</p>
        </div>
      </div>
    </div>
  </body>
</html>
